<!DOCTYPE html>
<html>
<head>
    <title>Studio Wollmüller Contact</title>
    <!-- Add your CSS here -->
    <style>
        /* Gallery Section - Full Width */
        .gallery-section {
            width: 100%;
            padding: 80px 50px;
            background-color: transparent;
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-title {
            font-size: 36px;
            margin-bottom: 50px;
            letter-spacing: 1px;
            text-align: center;
            color: #bc0004;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 80px;
        }

        .gallery-item {
            aspect-ratio: 1; /* Line 9 - Keeping this as is */
            background-color: #e8e8e8;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .gallery-item:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(100%) brightness(0.95);
            transition: filter 0.3s ease;
        }

        .gallery-item:hover img {
            filter: grayscale(0%) brightness(1);
        }

        .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #999;
            background: linear-gradient(135deg, #f5f5f5 0%, #eeeeee 100%);
            width: 100%;
            height: 100%;
        }

        /* Contact Section */
        .contact-section {
            padding: 40px; /* Added padding for visual spacing */
        }

        .contact-info {
            display: flex; /* Added for better layout */
            gap: 30px; /* Added gap between contact items */
        }

        .contact-item {
            flex: 1; /* Equal width for contact items */
        }

        .contact-item a {
            display: block; /* Ensures links take full width */
            padding: 10px;
            text-decoration: none; /* Removes underlines */
            color: #333;
        }

        .contact-item a:hover {
            color: #8b0003;
            border-bottom-color: #8b0003;
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .services-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 15px 0;
            }

            .header-container {
                flex-direction: column;
                gap: 15px;
                padding: 0 20px;
            }

            .logo-section {
                gap: 10px;
            }

            .logo {
                height: 80px;
            }

            .logo img {
                height: 80px;
            }

            .studio-text {
                font-size: 25px;
            }

            nav ul {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .about-section {
                padding: 40px 20px;
            }

            .about-section h1 {
                font-size: 36px;
            }

            .gallery-section {
                padding: 40px 20px;
            }

            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .services-list {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .contact-section {
                padding: 40px 20px;
            }

            .contact-info {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .contact-section h2 {
                font-size: 28px;
            }
        }

        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }

            nav ul {
                gap: 10px;
            }

            nav a {
                font-size: 12px;
            }
    </style>
</head>
<body>

    <section class="contact-section" id="Kontakt">
        <h2>Kontakt</h2>
        <div class="contact-info">
            <div class="contact-item">
                <h3>E-Mail</h3>
                <p><a href="mailto:info@studio.wollmueller.com">info@studio.wollmueller.com</a></p>
            </div>
            <div class="contact-item">
                <h3>Telefon</h3>
                <p><a href="tel:+49123456789">+49 123 456 789</a></p>
            </div>
            <div class="contact-item">
                <h3>Website</h3>
                <p><a href="https://studio.wollmueller.com">studio.wollmueller.com</a></p>
            </div>
        </div>
    </section>

</body>
</html>
